name: iOS CI/CD

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  ci:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (Debug, iOS Simulator)
        run: |
          xcodebuild \
            -project "AfricanFashionApp.xcodeproj" \
            -scheme "AfricanFashionApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            build

      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -project "AfricanFashionApp.xcodeproj" \
            -scheme "AfricanFashionApp" \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            test

  cd:
    name: Release Archive Artifact
    runs-on: macos-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive (unsigned)
        run: |
          xcodebuild \
            -project "AfricanFashionApp.xcodeproj" \
            -scheme "AfricanFashionApp" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AfricanFashionApp.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          path: |
            ${{ runner.temp }}/AfricanFashionApp.xcarchive
